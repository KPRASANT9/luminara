<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSOS Canvas</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root{--bg:#0a0e14;--bg2:#0f1419;--bg3:#1a1f26;--fg:#b3b1ad;--fg2:#6c7380;--accent:#39bae6;--green:#7fd962;--red:#ff6b6b;--orange:#e6b450;--purple:#d2a6ff;--cyan:#95e6cb;--border:#1d2530}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'SF Mono','Fira Code','Menlo',monospace;overflow:hidden;height:100vh}

/* BAR */
#bar{height:38px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:12px}
.logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px}
.bar-sub{font-size:10px;color:var(--fg2)}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--fg2)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.off{background:var(--red)}

/* LAYOUT */
#main{display:flex;height:calc(100vh - 38px)}

/* LEFT: ring sidebar */
#left{width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;font-size:11px}
.sec{padding:8px 10px;border-bottom:1px solid var(--border)}
.sec h3{font-size:9px;text-transform:uppercase;color:var(--fg2);letter-spacing:1.2px;margin-bottom:5px}
.ri{padding:5px 8px;border-radius:4px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.ri:hover{background:var(--bg3)}
.ri .top{display:flex;justify-content:space-between;align-items:center}
.ri .nm{font-size:11px}.ri .sub{font-size:9px;color:var(--fg2);margin-top:1px}
.ri .sub b{color:var(--accent)}
.bar-t{height:2px;background:var(--bg);border-radius:1px;margin-top:3px;overflow:hidden}
.bar-f{height:100%;border-radius:1px;transition:width .6s}
.tag{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700}
.tag.ex{background:rgba(127,217,98,0.15);color:var(--green)}.tag.xp{background:rgba(230,180,80,0.15);color:var(--orange)}

/* CENTER: infinite canvas */
#cw{flex:1;position:relative;overflow:hidden}
#cw::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:20px 20px}
#cv{position:absolute;transform-origin:0 0}

/* CANVAS PANELS */
.p{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow .15s}
.p:hover{box-shadow:0 0 20px rgba(57,186,230,0.06)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:grab;user-select:none}
.ph .t{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.ph .x{background:none;border:none;color:var(--fg2);cursor:pointer;font-size:14px;font-family:inherit;line-height:1}
.ph .x:hover{color:var(--red)}
.pb{padding:8px 10px;font-size:11px;max-height:450px;overflow-y:auto}

/* GAUGE */
.ga{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ga .m{padding:4px 6px;background:var(--bg);border-radius:4px}
.ga .m .la{color:var(--fg2);font-size:8px;text-transform:uppercase;letter-spacing:.5px}
.ga .m .va{color:var(--accent);font-size:14px;font-weight:700;margin-top:1px}
.ga .m .br{height:3px;background:var(--bg3);border-radius:1px;margin-top:3px;overflow:hidden}
.ga .m .bf{height:100%;border-radius:1px;transition:width .5s}
.dec{margin-top:6px;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.dec.EXECUTE{background:rgba(127,217,98,0.12);color:var(--green)}
.dec.EXPLORE{background:rgba(230,180,80,0.12);color:var(--orange)}

/* MERMAID */
.p.diagram .pb{background:var(--bg);padding:10px}
.p.diagram svg{max-width:100%!important}

/* TIMELINE */
.tl-entry{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);font-size:10px;display:flex;gap:6px}
.tl-entry .tm{color:var(--fg2);min-width:50px;font-size:9px}
.tl-entry .sub{color:var(--purple);font-weight:600;min-width:60px}
.tl-entry .dec-t{font-weight:700}
.tl-entry .dec-t.EXECUTE{color:var(--green)}.tl-entry .dec-t.EXPLORE{color:var(--orange)}
.tl-entry .delta{color:var(--cyan)}

/* CALVINS */
.cal-item{display:inline-block;padding:2px 6px;margin:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:9px}
.cal-item .cn{color:var(--purple)}.cal-item .cf{color:var(--fg2)}

/* COMMAND */
#cmd-wrap{display:flex;border:1px solid var(--border);border-radius:5px;background:var(--bg3);overflow:hidden}
#cmd-wrap .pr{color:var(--accent);padding:7px 6px 7px 10px;font-size:11px;white-space:nowrap}
#cmd{flex:1;background:transparent;border:none;color:var(--fg);padding:7px 10px 7px 0;font-family:inherit;font-size:11px;outline:none}
#cmd-send{background:var(--accent);color:var(--bg);border:none;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700}
#cmd-send:hover{opacity:.8}

/* RIGHT: timeline + command */
#right{width:280px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;font-size:11px}
.r-sec{padding:8px 10px;border-bottom:1px solid var(--border)}
.r-sec h3{font-size:9px;text-transform:uppercase;color:var(--fg2);letter-spacing:1px;margin-bottom:6px}
#timeline{flex:1;overflow-y:auto;padding:6px 10px}
#cmd-area{padding:10px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div id="bar">
  <span class="logo">CSOS</span>
  <span class="bar-sub">spatial canvas — window into the daemon</span>
  <span class="bar-r">
    <span class="dot" id="dot"></span><span id="ss">connecting</span>
    <span style="color:var(--border)">|</span>
    <span id="info"></span>
  </span>
</div>
<div id="main">
  <div id="left">
    <div class="sec"><h3>Core Rings</h3><div id="core"></div></div>
    <div class="sec"><h3>Domain Rings</h3><div id="domain"></div></div>
    <div class="sec"><h3>Calvin Atoms</h3><div id="calvins"></div></div>
    <div class="sec"><h3>Specs</h3><div id="specs"></div></div>
    <div class="sec"><h3>Skills</h3><div id="skills"></div></div>
  </div>
  <div id="cw"><div id="cv"></div></div>
  <div id="right">
    <div class="r-sec"><h3>Command</h3>
      <div id="cmd-wrap">
        <span class="pr">daemon&gt;</span>
        <input id="cmd" placeholder='{"action":"see","ring":"eco_organism"}' />
        <button id="cmd-send">Send</button>
      </div>
      <div style="font-size:9px;color:var(--fg2);margin-top:4px">
        JSON → POST /api/command → daemon handle() → SSE → canvas updates
      </div>
    </div>
    <div class="r-sec"><h3>Observation Timeline</h3></div>
    <div id="timeline"></div>
  </div>
</div>
<script>
mermaid.initialize({startOnLoad:false,theme:'dark',
  themeVariables:{darkMode:true,background:'#0a0e14',primaryColor:'#1a1f26',primaryTextColor:'#b3b1ad',lineColor:'#39bae6',secondaryColor:'#0f3460'},
  flowchart:{curve:'basis'},securityLevel:'loose'});

const $=id=>document.getElementById(id);
let zoom=1,px=0,py=0,drag=false,ds={},dn=null,doff={};
let panels=[],pid=0,mc=0;
let state={rings:{},calvins:[],skills:{},specs:[]};

// ═══ SSE: one connection to the one daemon ═══
function connect(){
  const es=new EventSource('/events');
  es.onopen=()=>{$('dot').className='dot on';$('ss').textContent='live'};
  es.onerror=()=>{$('dot').className='dot off';$('ss').textContent='reconnecting';setTimeout(connect,3000)};

  // Initial full state on connect
  es.addEventListener('state',e=>{
    state=JSON.parse(e.data);
    renderSidebar();
    $('info').textContent=`${Object.keys(state.rings).length} rings | ${state.calvins?.length||0} calvins | ${state.specs?.length||0} specs`;
    // Auto-place system diagram on first connect
    if(!panels.some(p=>p.type==='diagram'))addSystemDiagram();
  });

  // Every absorb from daemon
  es.addEventListener('absorb',e=>{
    const d=JSON.parse(e.data);
    if(d.domain) state.rings.eco_domain={gradient:d.domain.grad,speed:d.domain.speed,F:d.domain.F,decision:d.decision};
    if(d.cockpit) state.rings.eco_cockpit={gradient:d.cockpit.grad,speed:d.cockpit.speed,decision:d.decision};
    if(d.organism) state.rings.eco_organism={gradient:d.organism.grad,speed:d.organism.speed,rw:d.organism.rw,decision:d.decision};
    renderSidebar();updateGauges();
    addTimeline(d.substrate,d.decision,d.delta,d.domain?.grad);
  });

  // Any daemon response (see, exec, web, etc)
  es.addEventListener('response',e=>{
    const d=JSON.parse(e.data);
    // If it's a ring state response, update
    if(d.name&&d.gradient!==undefined){
      state.rings[d.name]={gradient:d.gradient,speed:d.speed,F:d.F,rw:d.rw,cycles:d.cycles,
        decision:(d.speed>(d.rw||0.9))?'EXECUTE':'EXPLORE'};
      renderSidebar();updateGauges();
    }
    // If it's an absorb-like response with substrate
    if(d.substrate&&d.decision){
      addTimeline(d.substrate,d.decision,d.delta,d.domain?.grad);
    }
  });
}

// ═══ COMMAND INPUT: bidirectional Paper.design pattern ═══
function sendCommand(){
  const v=$('cmd').value.trim();if(!v)return;
  let cmd;
  try{cmd=JSON.parse(v)}catch{cmd={action:'absorb',substrate:'canvas',output:v}}
  fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cmd)})
    .then(r=>r.json()).then(d=>{addTimeline(d.substrate||cmd.action,d.decision||'',d.delta||0,d.domain?.grad||d.gradient||'')})
    .catch(e=>addTimeline('error',e.message,0,''));
  $('cmd').value='';
}
$('cmd').onkeydown=e=>{if(e.key==='Enter')sendCommand()};
$('cmd-send').onclick=sendCommand;

// ═══ SIDEBAR ═══
function renderSidebar(){
  const coreNames=['eco_organism','eco_domain','eco_cockpit'];
  const core=[],domain=[];
  for(const[name,s] of Object.entries(state.rings||{})){
    const dec=(s.decision==='EXECUTE'||s.decision===1)?'EXECUTE':'EXPLORE';
    const obj={name,grad:s.gradient||0,speed:s.speed||0,dec,cycles:s.cycles||0,rw:s.rw||0};
    if(coreNames.includes(name))core.push(obj);else domain.push(obj);
  }
  core.sort((a,b)=>coreNames.indexOf(a.name)-coreNames.indexOf(b.name));
  domain.sort((a,b)=>b.grad-a.grad);

  $('core').innerHTML='';
  core.forEach(r=>{
    const el=document.createElement('div');el.className='ri';
    el.innerHTML=`<div class="top"><span class="nm">${r.name}</span><span class="tag ${r.dec==='EXECUTE'?'ex':'xp'}">${r.dec}</span></div>`+
      `<div class="sub">grad:<b>${r.grad}</b> spd:<b>${typeof r.speed==='number'?r.speed.toFixed(2):r.speed}</b>${r.rw?` rw:${r.rw}`:''}</div>`+
      `<div class="bar-t"><div class="bar-f" style="width:${Math.min(100,r.grad/100)}%;background:${r.dec==='EXECUTE'?'var(--green)':'var(--orange)'}"></div></div>`;
    el.onclick=()=>addGauge(r.name);
    $('core').appendChild(el);
  });

  $('domain').innerHTML='';
  domain.slice(0,15).forEach(r=>{
    const el=document.createElement('div');el.className='ri';
    el.innerHTML=`<div class="top"><span class="nm">${r.name}</span><span class="tag ${r.dec==='EXECUTE'?'ex':'xp'}">${r.dec}</span></div>`+
      `<div class="sub">grad:<b>${r.grad}</b> spd:<b>${typeof r.speed==='number'?r.speed.toFixed(2):r.speed}</b></div>`;
    el.onclick=()=>addGauge(r.name);
    $('domain').appendChild(el);
  });

  // Calvins
  $('calvins').innerHTML='';
  (state.calvins||[]).forEach(c=>{
    $('calvins').innerHTML+=`<span class="cal-item"><span class="cn">${c.name}</span> <span class="cf">${c.formula||''}</span></span>`;
  });
  if(!(state.calvins||[]).length) $('calvins').innerHTML='<span style="color:var(--fg2);font-size:10px">none yet — daemon synthesizes from non-resonated patterns</span>';

  // Specs
  $('specs').innerHTML='';
  (state.specs||[]).forEach(s=>{
    const el=document.createElement('div');el.className='ri';
    el.innerHTML=`<span class="nm">${s}</span>`;
    el.onclick=()=>addSpecDiagram(s);
    $('specs').appendChild(el);
  });

  // Skills
  $('skills').innerHTML='';
  for(const[k,v] of Object.entries(state.skills||{})){
    $('skills').innerHTML+=`<div style="font-size:9px;color:var(--fg2);padding:2px 0"><span style="color:var(--cyan)">${k}</span>: ${String(v).slice(0,40)}</div>`;
  }
  if(!Object.keys(state.skills||{}).length) $('skills').innerHTML='<span style="color:var(--fg2);font-size:10px">none stored</span>';
}

// ═══ TIMELINE ═══
function addTimeline(sub,dec,delta,grad){
  const el=document.createElement('div');el.className='tl-entry';
  const t=new Date().toLocaleTimeString();
  el.innerHTML=`<span class="tm">${t}</span><span class="sub">${sub||''}</span><span class="dec-t ${dec||''}">${dec||''}</span><span class="delta">${delta?'delta='+delta:''}</span>`;
  $('timeline').prepend(el);
  if($('timeline').children.length>80)$('timeline').removeChild($('timeline').lastChild);
}

// ═══ CANVAS PANELS ═══
function mkPanel(type,title,x,y,w,html){
  const id='p'+(pid++);const el=document.createElement('div');el.className='p '+type;el.id=id;
  el.style.left=(x||100+pid*20)+'px';el.style.top=(y||60+pid*20)+'px';
  if(w)el.style.width=w+'px';
  el.innerHTML=`<div class="ph"><span class="t">${title}</span><span class="x" data-id="${id}">&times;</span></div><div class="pb" id="${id}_b">${html}</div>`;
  el.querySelector('.ph').onmousedown=e=>{if(e.target.classList.contains('x'))return;e.stopPropagation();dn=el;doff={x:e.clientX-parseInt(el.style.left),y:e.clientY-parseInt(el.style.top)}};
  el.querySelector('.x').onclick=e=>{e.stopPropagation();el.remove();panels=panels.filter(p=>p.id!==id)};
  $('cv').appendChild(el);panels.push({id,type,el});return id;
}

// ═══ GAUGE PANEL ═══
function addGauge(ring){
  if(panels.some(p=>p.ring===ring))return; // no duplicates
  const s=state.rings[ring]||{};
  const g=s.gradient||0,sp=s.speed||0,rw=s.rw||0.833,cy=s.cycles||0;
  const dec=(s.decision==='EXECUTE'||s.decision===1)?'EXECUTE':'EXPLORE';
  const id=mkPanel('gauge','ring: '+ring,20+panels.length*30,60+panels.length*30,260,
    `<div class="ga">`+
      `<div class="m"><div class="la">Gradient</div><div class="va _g">${g}</div><div class="br"><div class="bf _gb" style="width:${Math.min(100,g/100)}%;background:var(--green)"></div></div></div>`+
      `<div class="m"><div class="la">Speed</div><div class="va _s">${typeof sp==='number'?sp.toFixed(3):sp}</div><div class="br"><div class="bf _sb" style="width:${Math.min(100,sp*10)}%;background:var(--accent)"></div></div></div>`+
      `<div class="m"><div class="la">Cycles</div><div class="va _c">${cy}</div></div>`+
      `<div class="m"><div class="la">Threshold (rw)</div><div class="va" style="font-size:11px">${typeof rw==='number'?rw.toFixed(3):rw}</div></div>`+
    `</div><div class="dec ${dec} _d">${dec}</div>`);
  const nd=panels.find(p=>p.id===id);if(nd)nd.ring=ring;
}

function updateGauges(){
  for(const p of panels){
    if(p.type!=='gauge'||!p.ring)continue;
    const s=state.rings[p.ring];if(!s)continue;
    const b=p.el.querySelector('.pb');if(!b)continue;
    const dec=(s.decision==='EXECUTE'||s.decision===1)?'EXECUTE':'EXPLORE';
    const g=b.querySelector('._g'),sp=b.querySelector('._s'),c=b.querySelector('._c'),d=b.querySelector('._d');
    const gb=b.querySelector('._gb'),sb=b.querySelector('._sb');
    if(g)g.textContent=s.gradient||0;
    if(sp)sp.textContent=(s.speed||0).toFixed?.(3)||(s.speed||0);
    if(c)c.textContent=s.cycles||0;
    if(gb)gb.style.width=Math.min(100,(s.gradient||0)/100)+'%';
    if(sb)sb.style.width=Math.min(100,(s.speed||0)*10)+'%';
    if(d){d.textContent=dec;d.className='dec '+dec+' _d'}
  }
}

// ═══ SYSTEM DIAGRAM (auto-placed on connect) ═══
async function addSystemDiagram(){
  const coreNames=['eco_organism','eco_domain','eco_cockpit'];
  const coreRings=coreNames.filter(n=>state.rings[n]);
  const domainRings=Object.keys(state.rings).filter(n=>!coreNames.includes(n)).slice(0,6);

  let md='flowchart TD\n';
  md+='  subgraph Core["Core Rings"]\n';
  coreRings.forEach(r=>{
    const s=state.rings[r];
    const dec=(s.decision==='EXECUTE'||s.decision===1)?'EXECUTE':'EXPLORE';
    md+=`    ${r}["${r}\\ngrad=${s.gradient||0} ${dec}"]\n`;
  });
  md+='  end\n';
  if(domainRings.length){
    md+='  subgraph Domain["Domain Rings"]\n';
    domainRings.forEach(r=>{
      const s=state.rings[r];
      md+=`    ${r}["${r}\\ngrad=${s.gradient||0}"]\n`;
    });
    md+='  end\n';
  }
  // Edges: domain → eco_domain → eco_cockpit → eco_organism
  domainRings.forEach(r=>md+=`  ${r} --> eco_domain\n`);
  md+='  eco_domain --> eco_cockpit\n  eco_cockpit --> eco_organism\n';
  md+='\n  classDef default fill:#1a1f26,stroke:#39bae6,color:#b3b1ad\n';

  const mid='sys_'+(mc++);
  const id=mkPanel('diagram','System Topology',30,50,420,'<div id="'+mid+'">rendering...</div>');
  try{const{svg}=await mermaid.render(mid+'_r',md);$(mid).innerHTML=svg}
  catch(e){$(mid).innerHTML='<pre style="color:var(--red);font-size:10px">'+e.message+'</pre>'}
}

// ═══ SPEC DIAGRAM (click spec in sidebar) ═══
async function addSpecDiagram(specName){
  // Fetch spec content via daemon command
  const r=await fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'exec',command:'cat specs/'+specName,substrate:'spec_read'})});
  const d=await r.json();
  const src=d.data||'';

  const atoms=[],rings=[],agents=[];
  for(const line of src.split('\n')){
    const t=line.trim();
    if(t.startsWith('atom '))atoms.push(t.match(/atom\s+(\w+)/)?.[1]||'');
    else if(t.startsWith('ring '))rings.push(t.match(/ring\s+(\w+)/)?.[1]||'');
    else if(t.startsWith('agent '))agents.push(t.match(/agent\s+(\w+)/)?.[1]||'');
  }
  if(!atoms.length&&!rings.length)return;

  let md='flowchart TD\n';
  if(atoms.length){md+='  subgraph Atoms["Atoms"]\n';atoms.forEach(a=>md+=`    ${a}["${a}"]\n`);md+='  end\n'}
  if(rings.length){md+='  subgraph Rings["Rings"]\n';rings.forEach(r=>md+=`    ${r}{{"${r}"}}\n`);md+='  end\n'}
  if(agents.length){md+='  subgraph Agents["Agents"]\n';agents.forEach(a=>md+=`    ${a}(["${a}"])\n`);md+='  end\n'}
  atoms.forEach(a=>{rings.forEach(r=>md+=`  ${a} --> ${r}\n`)});
  rings.forEach(r=>{agents.forEach(a=>md+=`  ${r} -.-> ${a}\n`)});
  md+='\n  classDef default fill:#1a1f26,stroke:#39bae6,color:#b3b1ad\n';

  const mid='sp_'+(mc++);
  const id=mkPanel('diagram','spec: '+specName,460,50,380,'<div id="'+mid+'">rendering...</div>');
  try{const{svg}=await mermaid.render(mid+'_r',md);$(mid).innerHTML=svg}
  catch(e){$(mid).innerHTML='<pre style="color:var(--red);font-size:10px">'+e.message+'</pre>'}
}

// ═══ PAN & ZOOM ═══
const cw=$('cw'),cv=$('cv');
cw.onmousedown=e=>{if(!dn&&(e.target===cw||e.target.id==='cw')){drag=true;ds={x:e.clientX-px,y:e.clientY-py};cw.style.cursor='grabbing'}};
document.onmousemove=e=>{
  if(dn){dn.style.left=(e.clientX-doff.x)+'px';dn.style.top=(e.clientY-doff.y)+'px';return}
  if(drag){px=e.clientX-ds.x;py=e.clientY-ds.y;cv.style.transform=`translate(${px}px,${py}px) scale(${zoom})`}
};
document.onmouseup=()=>{drag=false;cw.style.cursor='';dn=null};
cw.onwheel=e=>{e.preventDefault();zoom=Math.max(0.15,Math.min(5,zoom+(e.deltaY>0?-0.08:0.08)));cv.style.transform=`translate(${px}px,${py}px) scale(${zoom})`};

// ═══ BOOT ═══
connect();
</script>
</body>
</html>
