<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSOS Canvas</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root{--bg:#0a0e14;--bg2:#0f1419;--bg3:#1a1f26;--fg:#b3b1ad;--fg2:#6c7380;--fg3:#4a5060;--accent:#39bae6;--green:#7fd962;--red:#ff6b6b;--orange:#e6b450;--purple:#d2a6ff;--cyan:#95e6cb;--border:#1d2530}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'SF Mono','Fira Code','Menlo',monospace;overflow:hidden;height:100vh}

/* ═══ TOP BAR ═══ */
#bar{height:40px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.logo{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:3px}
.bar-sub{font-size:10px;color:var(--fg2)}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--fg2)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.off{background:var(--red)}
.presence{display:flex;gap:-4px}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);border:2px solid var(--bg);margin-left:-6px;cursor:default}

/* ═══ LAYOUT: 3 columns ═══ */
#main{display:flex;height:calc(100vh - 40px)}

/* ═══ LEFT: Datasources + Volumes ═══ */
#left{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#left-scroll{flex:1;overflow-y:auto}
.sec{padding:8px 12px;border-bottom:1px solid var(--border)}
.sec h3{font-size:8px;text-transform:uppercase;color:var(--fg3);letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.sec h3 .cnt{background:var(--bg3);padding:0 5px;border-radius:3px;font-size:8px;color:var(--accent)}
.sec h3 .add-btn{background:none;border:1px solid var(--border);color:var(--accent);padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.sec h3 .add-btn:hover{background:var(--accent);color:var(--bg)}

/* Template items */
.tmpl{padding:6px 8px;border-radius:4px;margin-bottom:3px;border:1px solid var(--border);cursor:pointer;transition:all .12s}
.tmpl:hover{border-color:var(--accent);background:rgba(57,186,230,0.04)}
.tmpl .t-name{font-size:10px;font-weight:600;color:var(--accent)}
.tmpl .t-desc{font-size:8px;color:var(--fg3);margin-top:1px}
.tmpl .t-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.tmpl .t-tag{font-size:7px;padding:1px 4px;border-radius:2px;background:var(--bg3);color:var(--fg2)}
.tmpl .t-tag.conn{color:var(--cyan)}.tmpl .t-tag.rt{color:var(--purple)}

/* Datasource items */
.ds{padding:5px 8px;border-radius:4px;margin-bottom:3px;border:1px solid var(--border);font-size:10px;cursor:pointer;transition:all .12s}
.ds:hover{border-color:var(--accent)}
.ds .ds-name{font-weight:600;color:var(--cyan)}
.ds .ds-meta{font-size:8px;color:var(--fg3);margin-top:1px}
.ds .ds-status{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px}
.ds .ds-status.ok{background:var(--green)}.ds .ds-status.err{background:var(--red)}.ds .ds-status.cfg{background:var(--orange)}

/* Volume/artifact items */
.vol{padding:4px 8px;border-radius:3px;font-size:9px;margin-bottom:2px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:6px}
.vol:hover{background:var(--bg3)}
.vol .v-icon{color:var(--purple);font-size:11px}
.vol .v-name{color:var(--fg)}
.vol .v-badge{background:var(--bg3);padding:0 4px;border-radius:2px;font-size:7px;color:var(--accent);margin-left:auto}

/* Ring summary */
.ring-mini{padding:4px 8px;border-radius:3px;font-size:9px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.ring-mini .rn{color:var(--fg)}
.ring-mini .rd{font-size:7px;font-weight:800;padding:1px 4px;border-radius:2px}
.ring-mini .rd.ex{background:rgba(127,217,98,0.1);color:var(--green)}
.ring-mini .rd.xp{background:rgba(230,180,80,0.1);color:var(--orange)}

/* ═══ CENTER: Workflow builder ═══ */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Workflow editor */
#editor-area{display:flex;border-bottom:1px solid var(--border);height:140px;flex-shrink:0}
#mermaid-editor{flex:1;background:var(--bg);border:none;color:var(--fg);padding:10px;font-family:inherit;font-size:11px;resize:none;outline:none;line-height:1.5}
#editor-controls{width:100px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:6px;gap:4px}
.ctrl-btn{background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:5px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:9px;font-weight:600;transition:all .12s;text-align:center}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.run{border-color:var(--green);color:var(--green)}
.ctrl-btn.run:hover{background:var(--green);color:var(--bg)}
.ctrl-btn.stop{border-color:var(--red);color:var(--red)}
.ctrl-btn.stop:hover{background:var(--red);color:var(--bg)}

/* Diagram render */
#diagram-area{flex:1;overflow:auto;background:var(--bg);position:relative;min-height:200px}
#diagram-area svg{max-width:100%!important}
#diagram-render{padding:16px}
#run-overlay{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:5}

/* Runtime output */
#runtime{border-top:1px solid var(--border);max-height:200px;overflow-y:auto;background:var(--bg2);display:none;flex-shrink:0}
#runtime.active{display:block}
#runtime-bar{padding:5px 12px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:8px;text-transform:uppercase;color:var(--fg3);letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
#runtime-bar .running{color:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#runtime-log{padding:6px 12px;font-size:10px}
.rt-step{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;gap:8px;align-items:baseline}
.rt-step .rt-node{color:var(--accent);font-weight:700;min-width:40px}
.rt-step .rt-op{color:var(--fg3);font-size:8px;min-width:50px}
.rt-step .rt-out{color:var(--fg);flex:1;word-break:break-all}
.rt-step .rt-dec{font-weight:700;font-size:8px}
.rt-step .rt-dec.EXECUTE{color:var(--green)}.rt-step .rt-dec.EXPLORE{color:var(--orange)}
.rt-step.error .rt-out{color:var(--red)}
.rt-step.running{opacity:.6}
.rt-step.success .rt-node::before{content:'[OK] ';color:var(--green);font-size:7px}
.rt-step.fail .rt-node::before{content:'[FAIL] ';color:var(--red);font-size:7px}
.rt-step .rt-meta{font-size:7px;color:var(--fg3);margin-left:4px}
.rt-step .rt-copy{background:none;border:1px solid var(--border);color:var(--fg3);padding:0 4px;border-radius:2px;cursor:pointer;font-size:7px;font-family:inherit;margin-left:4px}
.rt-step .rt-copy:hover{color:var(--accent);border-color:var(--accent)}
.rt-inline{margin-top:3px;padding:4px 6px;background:var(--bg);border-radius:3px;font-size:9px;max-height:80px;overflow-y:auto;cursor:pointer;border:1px solid var(--border);word-break:break-all}
.rt-inline:hover{border-color:var(--accent)}
#wf-summary{padding:4px 12px;background:var(--bg3);border-top:1px solid var(--border);font-size:9px;display:none;align-items:center;gap:8px}
#wf-summary.show{display:flex}
.sum-badge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700}
.sum-badge.pass{background:rgba(127,217,98,0.12);color:var(--green)}
.sum-badge.fail{background:rgba(255,107,107,0.12);color:var(--red)}

/* ═══ RIGHT: Timeline + Collaboration ═══ */
#right{width:240px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;font-size:11px}

/* Collab */
#collab-area{padding:8px 12px;border-bottom:1px solid var(--border)}
#collab-area h3{font-size:8px;text-transform:uppercase;color:var(--fg3);letter-spacing:1.5px;margin-bottom:5px}
#collab-list{display:flex;flex-wrap:wrap;gap:4px}
.collab-user{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:3px;background:var(--bg3);font-size:9px}
.collab-dot{width:6px;height:6px;border-radius:50%}

/* Scan */
#scan-area{padding:8px 12px;border-bottom:1px solid var(--border)}
#scan-area h3{font-size:8px;text-transform:uppercase;color:var(--fg3);letter-spacing:1.5px;margin-bottom:5px}
#scan-target{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:4px 8px;border-radius:4px;font-family:inherit;font-size:10px;outline:none;margin-bottom:4px}
.scan-row{display:flex;gap:3px}
.scan-btn{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--fg2);padding:4px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:8px;font-weight:600;transition:all .12s;text-align:center}
.scan-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Timeline */
.r-sec{padding:6px 10px;border-bottom:1px solid var(--border)}
.r-sec h3{font-size:8px;text-transform:uppercase;color:var(--fg3);letter-spacing:1.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.r-sec h3 .cnt{background:var(--bg3);padding:0 5px;border-radius:3px;font-size:8px;color:var(--accent)}
#timeline{flex:1;overflow-y:auto;padding:4px 10px}
.tl{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02);font-size:9px;display:flex;gap:4px;align-items:baseline}
.tl .tm{color:var(--fg3);min-width:42px;font-size:8px}
.tl .sub{color:var(--purple);font-weight:600;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl .dec-t{font-weight:800;font-size:8px}
.tl .dec-t.EXECUTE{color:var(--green)}.tl .dec-t.EXPLORE{color:var(--orange)}
.tl .delta{color:var(--cyan);font-size:8px}

/* Command */
#cmd-area{padding:8px 10px;border-top:1px solid var(--border)}
#cmd-wrap{display:flex;border:1px solid var(--border);border-radius:5px;background:var(--bg3);overflow:hidden}
#cmd-wrap .pr{color:var(--accent);padding:5px 6px 5px 8px;font-size:10px}
#cmd{flex:1;background:transparent;border:none;color:var(--fg);padding:5px 8px 5px 0;font-family:inherit;font-size:10px;outline:none}
#cmd-send{background:var(--accent);color:var(--bg);border:none;padding:5px 10px;cursor:pointer;font-family:inherit;font-size:9px;font-weight:700}

/* Modal (add datasource) */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:380px;max-height:80vh;overflow-y:auto}
#modal h2{padding:12px 16px;font-size:12px;color:var(--accent);border-bottom:1px solid var(--border)}
#modal .form{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
#modal label{font-size:9px;color:var(--fg2);text-transform:uppercase;letter-spacing:.5px}
#modal input,#modal select{background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:10px;outline:none}
#modal input:focus{border-color:var(--accent)}
#modal .form-actions{display:flex;gap:6px;justify-content:flex-end;padding-top:6px}
#modal .form-actions button{padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;border:1px solid var(--border)}
.btn-cancel{background:var(--bg3);color:var(--fg)}
.btn-save{background:var(--accent);color:var(--bg);border-color:var(--accent)!important}

@media(max-width:800px){#left{width:170px}#right{width:200px}}
@media(max-width:600px){#left{display:none}#right{display:none}}
</style>
</head>
<body>

<div id="bar">
  <span class="logo">CSOS</span>
  <span class="bar-sub">workflow canvas</span>
  <span class="bar-r">
    <span class="dot" id="dot"></span><span id="ss">connecting</span>
    <span style="color:var(--border)">|</span>
    <span id="info"></span>
    <span style="color:var(--border)">|</span>
    <div class="presence" id="presence"></div>
  </span>
</div>

<div id="main">
  <!-- LEFT: Datasources + Volumes -->
  <div id="left"><div id="left-scroll">
    <div class="sec">
      <h3>Templates <span class="cnt" id="tmpl-cnt">0</span></h3>
      <div id="tmpl-list"></div>
    </div>
    <div class="sec">
      <h3>Datasources <span class="cnt" id="ds-cnt">0</span><button class="add-btn" onclick="showAddDS()">+</button></h3>
      <div id="ds-list"></div>
    </div>
    <div class="sec">
      <h3>Volumes <span class="cnt" id="vol-cnt">0</span><button class="add-btn" onclick="autoload()">scan</button></h3>
      <div id="vol-list"></div>
    </div>
    <div class="sec">
      <h3>Rings <span class="cnt" id="ring-cnt">0</span></h3>
      <div id="ring-list"></div>
    </div>
  </div></div>

  <!-- CENTER: Workflow Builder + Runtime -->
  <div id="center">
    <div id="editor-area">
      <textarea id="mermaid-editor" spellcheck="false">flowchart TD
  A["Ingest Data"] --> B["Process Signals"]
  B --> C["Compute Trends"]
  C --> D["Decide Action"]
  D -->|EXECUTE| E["Deliver Output"]
  D -->|EXPLORE| F["Observe More"]
  F --> A</textarea>
      <div id="editor-controls">
        <button class="ctrl-btn" onclick="renderDiagram()">Render</button>
        <button class="ctrl-btn run" id="run-btn" onclick="runWorkflow()">Run</button>
        <button class="ctrl-btn stop" onclick="stopWorkflow()">Stop</button>
        <div style="flex:1"></div>
        <button class="ctrl-btn" onclick="downloadAs('json')" title="Download JSON">JSON</button>
        <button class="ctrl-btn" onclick="downloadAs('csv')" title="Download CSV">CSV</button>
        <button class="ctrl-btn" onclick="downloadAs('summary')" title="Download summary">TXT</button>
        <button class="ctrl-btn" onclick="clearRuntime()">Clear</button>
      </div>
    </div>
    <div id="diagram-area"><div id="diagram-render"></div><div id="run-overlay"></div></div>
    <div id="runtime"><div id="runtime-bar"><span>Runtime Output</span><span id="rt-status"></span></div><div id="runtime-log"></div><div id="wf-summary"></div></div>
  </div>

  <!-- RIGHT: Collaboration + Timeline -->
  <div id="right">
    <div id="collab-area"><h3>Collaborators</h3><div id="collab-list"></div></div>
    <div id="scan-area">
      <h3>Scan</h3>
      <input id="scan-target" placeholder="ring or substrate..." />
      <div class="scan-row">
        <button class="scan-btn" onclick="scan('see')">See</button>
        <button class="scan-btn" onclick="scan('lint')">Lint</button>
        <button class="scan-btn" onclick="scan('diagnose')">Diag</button>
        <button class="scan-btn" onclick="scan('observe')">Observe</button>
      </div>
    </div>
    <div class="r-sec"><h3>Timeline <span class="cnt" id="tl-cnt">0</span></h3></div>
    <div id="timeline"></div>
    <div id="cmd-area">
      <div id="cmd-wrap">
        <span class="pr">&gt;</span>
        <input id="cmd" placeholder="JSON command..." />
        <button id="cmd-send">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Datasource Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2>Add Datasource</h2>
    <div class="form">
      <label>Name</label><input id="ds-name" placeholder="e.g. databricks_prod" />
      <label>Type</label>
      <select id="ds-type"><option value="api">API</option><option value="database">Database</option><option value="url">URL</option><option value="file">File</option></select>
      <label>URL / Endpoint</label><input id="ds-url" placeholder="https://..." />
      <label>Auth Method</label>
      <select id="ds-auth-method"><option value="none">None</option><option value="bearer">Bearer Token</option><option value="basic">Basic Auth</option><option value="api_key">API Key</option></select>
      <label>Token / Key</label><input id="ds-token" type="password" placeholder="secret" />
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="addDS()">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
mermaid.initialize({startOnLoad:false,theme:'dark',
  themeVariables:{darkMode:true,background:'#0a0e14',primaryColor:'#1a1f26',primaryTextColor:'#b3b1ad',lineColor:'#39bae6',secondaryColor:'#0f3460'},
  flowchart:{curve:'basis',padding:10},securityLevel:'loose'});

const $=id=>document.getElementById(id);
let S={rings:{},calvins:[],specs:[],observed:[],topology:{}};
let tlCount=0, mc=0;
let clientId='c_'+Math.random().toString(36).slice(2,8);
let clientName='';

// ═══ SSE: daemon stream ═══
function connect(){
  const es=new EventSource('/events');
  es.onopen=()=>{$('dot').className='dot on';$('ss').textContent='live';joinCollab()};
  es.onerror=()=>{$('dot').className='dot off';$('ss').textContent='reconnecting'};

  es.addEventListener('state',e=>{
    S=JSON.parse(e.data);
    $('info').textContent=`${Object.keys(S.rings).length} rings`;
    renderSidebar();renderDiagram();loadDatasources();autoload();loadTemplates();
  });
  // Native binary sends 'response' events for all commands (absorb, see, etc.)
  es.addEventListener('response',e=>{
    const d=JSON.parse(e.data);
    // Absorb response (has physics.domain/cockpit/organism)
    if(d.physics){
      const p=d.physics;
      if(p.domain) S.rings.eco_domain={...S.rings.eco_domain,gradient:p.domain.grad,speed:p.domain.speed,F:p.domain.F,decision:p.decision};
      if(p.cockpit) S.rings.eco_cockpit={...S.rings.eco_cockpit,gradient:p.cockpit.grad,speed:p.cockpit.speed};
      if(p.organism) S.rings.eco_organism={...S.rings.eco_organism,gradient:p.organism.grad,speed:p.organism.speed,rw:p.organism.rw,decision:p.decision};
      renderSidebar();
      addTimeline(d.substrate||d.data||'cmd',p.decision||'',d.signals||p.delta||0);
    }
    // See/lint response (has name + gradient)
    else if(d.name&&d.gradient!==undefined){
      S.rings[d.name]={...S.rings[d.name],gradient:d.gradient,speed:d.speed,F:d.F,rw:d.rw||d.resonance_width,decision:d.decision||'EXPLORE'};
      renderSidebar();
    }
  });
  // Workflow events
  es.addEventListener('workflow',e=>{
    const d=JSON.parse(e.data);
    if(d.event==='start'){
      $('runtime').classList.add('active');
      $('rt-status').className='running';$('rt-status').textContent=`running ${d.nodes||0} nodes, ${d.edges||0} edges`;
      $('runtime-log').innerHTML='';
      $('run-btn').textContent='Running';$('run-btn').disabled=true;
    } else if(d.event==='step_start'){
      addRuntimeStep(d.node,d.op,'running...',d.label,'running');
    } else if(d.event==='step_done'){
      _nodeOutputs[d.node]=d.output||'';
      const statusColor=d.status==='success'?'#7fd962':d.status==='fail'?'#ff6b6b':'#e6b450';
      updateRuntimeStep(d.node,d.output,d.decision,'',{
        status:d.status,gradient:d.gradient,speed:d.speed,F:d.F,
        edges:d.edges,duration_ms:d.duration_ms
      });
      highlightNode(d.node,statusColor);
      addTimeline(d.label||d.node,d.status==='success'?'OK':d.status==='fail'?'FAIL':d.decision,d.delta);
    } else if(d.event==='step_error'){
      _nodeOutputs[d.node]=d.error||'';
      updateRuntimeStep(d.node,d.error,'','fail',{status:'fail'});
      highlightNode(d.node,'#ff6b6b');
    } else if(d.event==='complete'){
      $('rt-status').className='';$('rt-status').textContent='complete';
      $('run-btn').textContent='Run';$('run-btn').disabled=false;
      if(d.mermaid){$('mermaid-editor').value=d.mermaid;renderDiagram()}
      // Show pass/fail summary with download options
      if(d.uir){
        const nodes=Object.values(d.uir.nodes||{});
        const summary={success:0,fail:0,pending:0,total:nodes.length,passed:true};
        nodes.forEach(n=>{summary[n.status]=(summary[n.status]||0)+1;if(n.status==='fail')summary.passed=false});
        showSummary(summary);
      }
    } else if(d.event==='stopped'){
      $('rt-status').className='';$('rt-status').textContent='stopped';
      $('run-btn').textContent='Run';$('run-btn').disabled=false;
    }
  });
  // Datasource events
  es.addEventListener('datasource',e=>{loadDatasources()});
  // Collaboration events
  es.addEventListener('collab',e=>{
    const d=JSON.parse(e.data);
    if(d.event==='join'||d.event==='leave') renderPresence(d.clients||[]);
    if(d.event==='workflow_update'&&d.client_id!==clientId){
      $('mermaid-editor').value=d.mermaid;renderDiagram();
    }
  });
}

// ═══ COLLABORATION ═══
function joinCollab(){
  clientName=sessionStorage.getItem('csos-name')||prompt('Your name for collaboration:')||'anon';
  sessionStorage.setItem('csos-name',clientName);
  fetch('/api/collaborate',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'join',client_id:clientId,name:clientName})})
    .then(r=>r.json()).then(d=>renderPresence(d.clients||[]));
}

function renderPresence(clients){
  $('presence').innerHTML='';
  $('collab-list').innerHTML='';
  clients.forEach(c=>{
    const av=document.createElement('div');av.className='avatar';av.style.background=c.color;
    av.textContent=c.name[0].toUpperCase();av.title=c.name;
    $('presence').appendChild(av);
    $('collab-list').innerHTML+=`<div class="collab-user"><div class="collab-dot" style="background:${c.color}"></div>${c.name}</div>`;
  });
}

// Broadcast mermaid changes to collaborators (debounced)
let _syncTimer=null;
$('mermaid-editor').addEventListener('input',()=>{
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{
    fetch('/api/collaborate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'workflow_update',client_id:clientId,mermaid:$('mermaid-editor').value})});
  },1000);
});

// ═══ MERMAID RENDER ═══
async function renderDiagram(){
  const src=$('mermaid-editor').value.trim();
  if(!src)return;
  const mid='d'+(mc++);
  $('diagram-render').innerHTML=`<div id="${mid}"></div>`;
  try{
    const{svg}=await mermaid.render(mid+'_r',src);
    $(mid).innerHTML=svg;
  }catch(e){
    $(mid).innerHTML=`<pre style="color:var(--red);font-size:10px;padding:10px">${e.message}</pre>`;
  }
}

function highlightNode(nodeId,color){
  const el=document.querySelector(`[id*="flowchart-${nodeId}-"]`)||document.querySelector(`[id*="${nodeId}"]`);
  if(el){
    const rect=el.querySelector('rect')||el.querySelector('polygon')||el.querySelector('circle');
    if(rect){rect.style.stroke=color;rect.style.strokeWidth='3';setTimeout(()=>{rect.style.stroke='';rect.style.strokeWidth=''},3000)}
  }
}

// ═══ WORKFLOW EXECUTION ═══
function runWorkflow(){
  const mermaid_src=$('mermaid-editor').value.trim();
  if(!mermaid_src)return;
  $('runtime').classList.add('active');
  fetch('/api/workflow/run',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mermaid:mermaid_src,name:'wf_'+Date.now()})})
    .then(r=>r.json()).then(d=>{
      if(d.error){addRuntimeStep('ERR','','',d.error,'error');$('rt-status').textContent=d.error}
    });
}
function stopWorkflow(){
  fetch('/api/workflow/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
}
function clearRuntime(){$('runtime-log').innerHTML='';$('runtime').classList.remove('active')}

function addRuntimeStep(node,op,out,label,cls,extra){
  const el=document.createElement('div');el.className='rt-step '+(cls||'');el.id='rt_'+node;
  el.innerHTML=`<span class="rt-node">${node}</span><span class="rt-op">${op||''}</span><span class="rt-out">${out||label||''}</span>`;
  $('runtime-log').appendChild(el);
  $('runtime-log').scrollTop=$('runtime-log').scrollHeight;
}
function updateRuntimeStep(node,output,decision,cls,extra){
  const el=$('rt_'+node);
  if(!el)return;
  const status=extra?.status||cls||'';
  el.className='rt-step '+status;
  let html=`<span class="rt-node">${node}</span>`;
  // Duration
  if(extra?.duration_ms) html+=`<span class="rt-meta">${extra.duration_ms.toFixed(0)}ms</span>`;
  // Decision badge
  if(decision) html+=` <span class="rt-dec ${decision}">${decision}</span>`;
  // Physics metrics
  if(extra?.gradient!==undefined) html+=`<span class="rt-meta">grad=${extra.gradient} spd=${(extra.speed||0).toFixed(3)} F=${(extra.F||0).toFixed(3)}</span>`;
  // Edge rates
  if(extra?.edges) extra.edges.forEach(e=>{
    if(e.rate>0) html+=`<span style="color:var(--cyan);font-size:7px;margin-left:4px">${e.rate.toFixed(1)}/s</span>`;
  });
  // Copy button
  if(output) html+=`<button class="rt-copy" onclick="copyResult('${node}')">copy</button>`;
  // Inline result (expandable)
  if(output){
    const truncated=(output||'').slice(0,300);
    html+=`<div class="rt-inline" id="rt_out_${node}" onclick="expandResult('${node}')" title="Click to expand">${truncated}</div>`;
  }
  el.innerHTML=html;
}
// Store full outputs for copy/download
let _nodeOutputs={};
function copyResult(node){
  const text=_nodeOutputs[node]||'';
  navigator.clipboard?.writeText(text).then(()=>addTimeline(node,'COPIED',0));
}
function expandResult(node){
  const el=$('rt_out_'+node);
  if(!el)return;
  const full=_nodeOutputs[node]||'';
  if(el.style.maxHeight==='none'){el.style.maxHeight='80px';el.textContent=full.slice(0,300)}
  else{el.style.maxHeight='none';el.textContent=full}
}
function downloadAs(fmt){
  window.open('/api/download/'+fmt,'_blank');
}
function showSummary(status){
  const s=$('wf-summary');
  if(!status||!status.total){s.className='';return}
  s.className='show';
  const passed=status.passed;
  s.innerHTML=`<span class="sum-badge ${passed?'pass':'fail'}">${passed?'PASSED':'FAILED'}</span>
    <span style="color:var(--green)">${status.success} ok</span>
    <span style="color:var(--red)">${status.fail} fail</span>
    <span style="color:var(--fg3)">${status.pending} pending</span>
    <span style="flex:1"></span>
    <button class="ctrl-btn" onclick="downloadAs('json')" style="padding:2px 6px">Download JSON</button>
    <button class="ctrl-btn" onclick="downloadAs('csv')" style="padding:2px 6px">Download CSV</button>
    <button class="ctrl-btn" onclick="downloadAs('summary')" style="padding:2px 6px">Download TXT</button>`;
}

function saveDiagram(){
  const src=$('mermaid-editor').value;
  sessionStorage.setItem('csos-workflow',src);
  addTimeline('workflow','SAVED',0);
}

// ═══ DATASOURCES ═══
function loadDatasources(){
  fetch('/api/datasources').then(r=>r.json()).then(d=>{
    const ds=d.datasources||[];
    $('ds-cnt').textContent=ds.length;
    $('ds-list').innerHTML='';
    ds.forEach(s=>{
      const st=s.status==='connected'?'ok':s.status==='configured'?'cfg':'err';
      const el=document.createElement('div');el.className='ds';
      el.innerHTML=`<div><span class="ds-status ${st}"></span><span class="ds-name">${s.name}</span></div><div class="ds-meta">${s.type} | ${s.status}</div>`;
      el.onclick=()=>testDS(s.name);
      $('ds-list').appendChild(el);
    });
  }).catch(()=>{});
}
function showAddDS(){$('modal-overlay').classList.add('show')}
function closeModal(){$('modal-overlay').classList.remove('show')}
function addDS(){
  const ds={action:'add',name:$('ds-name').value,type:$('ds-type').value,url:$('ds-url').value,
    auth:{method:$('ds-auth-method').value,token:$('ds-token').value}};
  fetch('/api/datasources',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ds)})
    .then(r=>r.json()).then(()=>{closeModal();loadDatasources()});
}
function testDS(name){
  fetch('/api/datasources',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'test',name})}).then(r=>r.json()).then(d=>{
      addTimeline(name,d.status||'tested',0);loadDatasources();
    });
}

// ═══ AUTOLOADER ═══
function autoload(){
  fetch('/api/autoload').then(r=>r.json()).then(d=>{
    const arts=d.artifacts||[];
    const know=d.knowledge||{};
    $('vol-cnt').textContent=arts.length;
    $('vol-list').innerHTML='';
    arts.forEach(a=>{
      const icon=a.type==='.csos'?'\u25C8':a.type==='.json'?'{}':'\u25A2';
      const badge=a.atoms?a.atoms.length+' atoms':a.keys?a.keys.length+' keys':'';
      const el=document.createElement('div');el.className='vol';
      el.innerHTML=`<span class="v-icon">${icon}</span><span class="v-name">${a.name}</span>${badge?`<span class="v-badge">${badge}</span>`:''}`;
      el.onclick=()=>insertArtifact(a);
      $('vol-list').appendChild(el);
    });
  }).catch(()=>{});
}

function insertArtifact(art){
  // Insert artifact atoms/rings as mermaid nodes into the editor
  const editor=$('mermaid-editor');
  let insert='';
  if(art.atoms){
    art.atoms.forEach(a=>{insert+=`  ${a}["${a}"]\n`});
  }
  if(art.rings){
    art.rings.forEach(r=>{insert+=`  ${r}{{"${r}"}}\n`});
  }
  if(insert){
    editor.value=editor.value.trimEnd()+'\n'+insert;
    renderDiagram();
  }
}

// ═══ SIDEBAR ═══
function renderSidebar(){
  $('ring-cnt').textContent=Object.keys(S.rings||{}).length;
  $('ring-list').innerHTML='';
  for(const[name,s] of Object.entries(S.rings||{})){
    const dec=s.decision||'EXPLORE';
    $('ring-list').innerHTML+=`<div class="ring-mini"><span class="rn">${name}</span><span class="rd ${dec==='EXECUTE'?'ex':'xp'}">${dec} ${s.gradient||0}</span></div>`;
  }
}

// ═══ SCAN ═══
function scan(type){
  const target=$('scan-target').value.trim()||'eco_organism';
  let cmd;
  switch(type){
    case 'see':cmd={action:'see',ring:target,detail:'cockpit'};break;
    case 'lint':cmd={action:'lint',ring:target};break;
    case 'diagnose':cmd={action:'diagnose'};break;
    case 'observe':cmd={action:'absorb',substrate:target,output:`scan ${target} ${Date.now()}`};break;
  }
  fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cmd)})
    .then(r=>r.json()).then(d=>addTimeline(target,d.decision||type.toUpperCase(),d.delta||0));
}

// ═══ COMMAND ═══
$('cmd').onkeydown=e=>{if(e.key==='Enter')sendCmd()};
$('cmd-send').onclick=()=>sendCmd();
function sendCmd(){
  const v=$('cmd').value.trim();if(!v)return;
  let cmd;try{cmd=JSON.parse(v)}catch{cmd={action:'absorb',substrate:'canvas',output:v}}
  fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cmd)})
    .then(r=>r.json()).then(d=>addTimeline(d.substrate||cmd.action,d.decision||'',d.delta||0));
  $('cmd').value='';
}

// ═══ TIMELINE ═══
function addTimeline(sub,dec,delta){
  tlCount++;$('tl-cnt').textContent=tlCount;
  const el=document.createElement('div');el.className='tl';
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML=`<span class="tm">${t}</span><span class="sub" title="${sub||''}">${sub||''}</span><span class="dec-t ${dec||''}">${dec||''}</span><span class="delta">${delta?'d='+delta:''}</span>`;
  $('timeline').prepend(el);
  if($('timeline').children.length>100)$('timeline').removeChild($('timeline').lastChild);
}

// ═══ TEMPLATES ═══
function loadTemplates(){
  fetch('/api/templates').then(r=>r.json()).then(d=>{
    const tmpls=d.templates||[];
    $('tmpl-cnt').textContent=tmpls.length;
    $('tmpl-list').innerHTML='';
    tmpls.forEach(t=>{
      const el=document.createElement('div');el.className='tmpl';
      let tags='';
      (t.connectors||[]).forEach(c=>{tags+=`<span class="t-tag conn">${c}</span>`});
      (t.runtimes||[]).forEach(r=>{tags+=`<span class="t-tag rt">${r}</span>`});
      el.innerHTML=`<div class="t-name">${t.name}</div><div class="t-desc">${t.description}</div><div class="t-tags">${tags}
        <span class="t-tag" style="color:var(--accent);cursor:pointer" onclick="event.stopPropagation();adaptTemplate('${t.id}')">adapt</span></div>`;
      el.onclick=()=>applyTemplate(t.id);
      $('tmpl-list').appendChild(el);
    });
  }).catch(()=>{});
}
function applyTemplate(tid){
  fetch('/api/template/apply',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({template:tid,config:{}})})
    .then(r=>r.json()).then(d=>{
      if(d.raw_mermaid){
        $('mermaid-editor').value=d.raw_mermaid;
        renderDiagram();
        addTimeline('template',tid,0);
      }
    });
}
function adaptTemplate(tid){
  // Adaptive: auto-wires user's datasources and artifacts into template
  fetch('/api/template/apply',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({template:tid,adapt:true})})
    .then(r=>r.json()).then(d=>{
      if(d.mermaid){
        $('mermaid-editor').value=d.mermaid;
        renderDiagram();
        addTimeline('adapt',tid+' + datasources',0);
      }
    });
}

  fetch('/api/collaborate',{method:'POST',headers:{'Content-Type':'application/json'},

});
