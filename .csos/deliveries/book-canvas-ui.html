<!DOCTYPE html>n<html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0">n<title>book — Infinite Canvas</title>n<link rel=stylesheet href=/styles/main.css>n<link rel=stylesheet href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">n<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>n</head><body><div id=app>n<header class=toolbar><div class=toolbar-left><span class=logo>📖 book</span>n<button class=tool-btn data-tool=select title="Select (V)"><i class="fas fa-mouse-pointer"></i></button>n<button class=tool-btn data-tool=pan title="Pan (H)"><i class="fas fa-hand-paper"></i></button>n<button class=tool-btn data-action=zoom-in><i class="fas fa-search-plus"></i></button>n<button class=tool-btn data-action=zoom-out><i class="fas fa-search-minus"></i></button>n<button class=tool-btn data-action=fit><i class="fas fa-compress-arrows-alt"></i></button>n<button class=tool-btn data-action=grid><i class="fas fa-th"></i></button></div>n<div class=toolbar-center><input type=text id=diagram-name placeholder="Untitled Diagram" class=diagram-name-input></div>n<div class=toolbar-right><button class=action-btn id=btn-save><i class="fas fa-save"></i></button>n<button class=action-btn id=btn-preview><i class="fas fa-eye"></i></button>n<button class=action-btn primary id=btn-execute><i class="fas fa-play"></i> Execute</button></div></header>n<div class=main-container>n<aside class=sidebar left><div class=sidebar-section><h3>Data Sources</h3><div class=node-grid>n<div class=node-item draggable=true data-type=api><span class=icon>🌐</span><span>API</span></div>n<div class=node-item draggable=true data-type=database><span class=icon>🗄️</span><span>Database</span></div>n<div class=node-item draggable=true data-type=file><span class=icon>📄</span><span>File</span></div>n<div class=node-item draggable=true data-type=stream><span class=icon>🌊</span><span>Stream</span></div></div></div>n<div class=sidebar-section><h3>Processing</h3><div class=node-grid>n<div class=node-item draggable=true data-type=transform><span class=icon>⚙️</span><span>Transform</span></div>n<div class=node-item draggable=true data-type=filter><span class=icon>🔍</span><span>Filter</span></div>n<div class=node-item draggable=true data-type=aggregate><span class=icon>📊</span><span>Aggregate</span></div>n<div class=node-item draggable=true data-type=decision><span class=icon>💎</span><span>Decision</span></div></div></div>n<div class=sidebar-section><h3>Output</h3><div class=node-grid>n<div class=node-item draggable=true data-type=output><span class=icon>📤</span><span>Output</span></div>n<div class=node-item draggable=true data-type=rest><span class=icon>🔶</span><span>REST</span></div></div></div></aside>n<main class=canvas-container><canvas id=canvas></canvas>n<div class=canvas-info><span id=position>X:0 Y:0</span><span id=zoom-level>Zoom:100%</span><span id=session-id>Session:-</span></div>n<div class=status-bar><span id=connection-status><i class="fas fa-circle"></i> Disconnected</span><span id=node-count>Nodes:0</span></div></main>n<aside class=sidebar right><div class=sidebar-section id=node-properties style=display:none>n<h3>Node Properties</h3><div class=property-group><label>Label</label><input type=text id=prop-label></div>n<div class=property-group><label>Type</label><select id=prop-type><option value=transform>Transform</option><option value=filter>Filter</option></select></div>n<button class=btn-delete id=btn-delete-node>Delete Node</button></div>n<div class=sidebar-section><h3>Session</h3><button class=action-btn id=btn-new-session>New Session</button></div></aside></div></div>n<script>nconst app={canvas:null,sessionId:null,ws:null,nodes:[],selectedNode:null,nnt:{api:{l:'API',w:120,h:60,f:'#0e639c'},database:{l:'Database',w:120,h:60,f:'#4a3b8f'},nfile:{l:'File',w:120,h:60,f:'#5a3b2f'},stream:{l:'Stream',w:120,h:60,f:'#0e5e4f'},ntransform:{l:'Transform',w:120,h:60,f:'#7a3b0c',i:true,o:true},nfilter:{l:'Filter',w:120,h:60,f:'#3a5a7c',i:true,o:true},naggregate:{l:'Aggregate',w:120,h:60,f:'#5a3a7c',i:true,o:true},ndecision:{l:'Decision',w:100,h:80,f:'#7a6a1c',i:true,o:true},noutput:{l:'Output',w:120,h:60,f:'#2e7d32',i:true},rest:{l:'REST',w:120,h:60,f:'#1565c0',i:true}},nasync init(){const c=document.querySelector('.canvas-container');nthis.canvas=new fabric.Canvas('canvas',{width:c.clientWidth,height:c.clientHeight,backgroundColor:'#1e1e1e'});nthis.initEvents();await this.createSession();this.connectWebSocket();this.loadSample();},ninitEvents(){ndocument.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.onclick=()=>this.setTool(b.dataset.tool));ndocument.querySelectorAll('.tool-btn[data-action]').forEach(b=>b.onclick=()=>this.handleAction(b.dataset.action));ndocument.querySelectorAll('.node-item').forEach(i=>i.ondragstart=e=>e.dataTransfer.setData('nodeType',i.dataset.type));nconst cc=document.querySelector('.canvas-container');cc.ondragover=e=>e.preventDefault();ncc.ondrop=e=>{e.preventDefault();const t=e.dataTransfer.getData('nodeType'),r=cc.getBoundingClientRect();nthis.addNode(t,e.clientX-r.left,e.clientY-r.top)};nthis.canvas.on('selection:created',e=>this.onSelect(e));nthis.canvas.on('selection:updated',e=>this.onSelect(e));nthis.canvas.on('selection:cleared',()=>{this.selectedNode=null;document.getElementById('node-properties').style.display='none'});nthis.canvas.on('mouse:wheel',opt=>{let z=this.canvas.getZoom()*(0.999**opt.e.deltaY);nz=Math.max(0.1,Math.min(10,z));this.canvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY},z);this.updateZoom()});nthis.canvas.on('mouse:move',opt=>{const p=this.canvas.getPointer(opt.e);ndocument.getElementById('position').textContent='X:'+Math.round(p.x)+' Y:'+Math.round(p.y)});ndocument.getElementById('prop-label').oninput=e=>{if(this.selectedNode){this.selectedNode.item(1).set('text',e.target.value);this.canvas.renderAll()}};ndocument.getElementById('btn-delete-node').onclick=()=>this.deleteNode();ndocument.getElementById('btn-new-session').onclick=()=>this.createSession();ndocument.getElementById('btn-execute').onclick=()=>alert('Flow executed!\\nNodes:'+this.nodes.length);ndocument.onkeydown=e=>{if(e.key==='Delete'||e.key==='Backspace')this.deleteNode();if(e.key==='v')this.setTool('select');if(e.key==='h')this.setTool('pan')}},nsetTool(t){document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));nthis.canvas.selection=t==='select';this.canvas.defaultCursor=t==='pan'?'grab':'default'},nhandleAction(a){if(a==='zoom-in')this.canvas.setZoom(this.canvas.getZoom()*1.2);nif(a==='zoom-out')this.canvas.setZoom(this.canvas.getZoom()/1.2);if(a==='fit')this.canvas.setZoom(1);nthis.updateZoom()},naddNode(t,x,y){const c=this.nt[t]||this.nt.transform;nconst r=new fabric.Rect({width:c.w,height:c.h,fill:c.f,stroke:c.f,strokeWidth:2,rx:4,ry:4});nconst txt=new fabric.Text(c.l,{fontSize:14,fill:'#fff',originX:'center',originY:'center',left:c.w/2,top:c.h/2});nconst g=new fabric.Group([r,txt],{left:x-c.w/2,top:y-c.h/2,nodeType:t,nodeId:'node_'+Date.now()});nthis.canvas.add(g);this.nodes.push(g);this.updateNodeCount()},nonSelect(e){const s=e.selected[0];nif(s&&s.nodeId){this.selectedNode=s;document.getElementById('node-properties').style.display='block';ndocument.getElementById('prop-label').value=s.item(1).text}},ndeleteNode(){if(this.selectedNode){this.canvas.remove(this.selectedNode);nthis.nodes=this.nodes.filter(n=>n.nodeId!==this.selectedNode.nodeId);this.selectedNode=null;ndocument.getElementById('node-properties').style.display='none';this.updateNodeCount()}},nupdateZoom(){document.getElementById('zoom-level').textContent='Zoom:'+Math.round(this.canvas.getZoom()*100)+'%'},nupdateNodeCount(){document.getElementById('node-count').textContent='Nodes:'+this.nodes.length},nasync createSession(){try{const r=await fetch('/api/session/create',{method:'POST'});nconst d=await r.json();this.sessionId=d.sessionId;docume
